const W = 360, H = 640;

const MECH_DATA = {
  og:    { name:'OG',    hp:5200, color:'#00ff88', superName:'Omni-Wave Burst',   superDesc:'8-direction energy bolts radiate outward' },
  roby:  { name:'ROBY',  hp:3900, color:'#ff2244', superName:'Laser Cross',         superDesc:'Cross lasers fire from the left eye' },
  mechy: { name:'MECHY', hp:4500, color:'#00ccff', superName:'Missile Barrage',     superDesc:'Homing missiles lock every enemy on screen' },
};

// ── Shared mobile UI kit (post-apoc / tech aesthetic) ─────────
const RW = {
  FONT: 'Orbitron, Arial Black, sans-serif',
  FONT_BODY: 'Rajdhani, Arial, sans-serif',
  PINK: 0xff69b4,
  safe(scene) {
    const ar = scene.scale.width / Math.max(scene.scale.height, 1);
    const portrait = ar < 0.72;
    return { top: portrait ? 16 : 8, bottom: portrait ? 20 : 10, side: 10 };
  },
  fmt(n) { return n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'') + 'K' : `${n}`; },
};

function addCurrencyChip(scene, x, y, icon, value, accent, depth = 91) {
  const sf = { scrollFactor: 0 };
  const chip = scene.add.container(x, y).setDepth(depth).setScrollFactor(0);
  const bg = scene.add.rectangle(0, 0, 78, 28, 0x0a0a18, 0.92).setStrokeStyle(1.5, accent, 0.55);
  const sheen = scene.add.rectangle(0, -7, 74, 8, accent, 0.07);
  const ico = scene.add.image(-26, 0, icon).setScale(1.05);
  const glow = scene.add.circle(-26, 0, 10, accent, 0.12);
  const txt = scene.add.text(4, 0, RW.fmt(value), {
    fontSize: '13px', fontFamily: RW.FONT_BODY, color: '#eef0ff', fontStyle: '600'
  }).setOrigin(0, 0.5);
  chip.add([bg, sheen, glow, ico, txt]);
  chip.setData('txt', txt);
  chip.setData('setValue', v => txt.setText(RW.fmt(v)));
  return chip;
}

function addGameButton(scene, x, y, w, h, label, colors, cb, depth = 0) {
  const root = scene.add.container(x, y).setDepth(depth);
  const pad = scene.add.rectangle(0, 0, w + 20, h + 18, 0, 0).setInteractive({ useHandCursor: true });
  const shadow = scene.add.rectangle(2, 4, w, h, 0x000000, 0.35);
  const bg = scene.add.rectangle(0, 0, w, h, colors.dark).setStrokeStyle(2, colors.mid, 0.9);
  const shine = scene.add.rectangle(0, -h * 0.26, w - 6, h * 0.2, colors.bright, 0.1);
  const txt = scene.add.text(0, 0, label, {
    fontSize: `${Math.min(20, Math.floor(h * 0.38))}px`,
    fontFamily: RW.FONT, color: '#ffffff', stroke: '#00000066', strokeThickness: 3
  }).setOrigin(0.5);
  root.add([shadow, bg, shine, txt, pad]);
  const press = () => { root.setScale(0.95); shadow.setAlpha(0.15); bg.y = 2; txt.y = 2; };
  const release = () => { root.setScale(1); shadow.setAlpha(0.35); bg.y = 0; txt.y = 0; };
  pad.on('pointerover', () => { bg.setFillStyle(colors.mid); bg.setStrokeStyle(2, colors.bright, 1); });
  pad.on('pointerout', () => { release(); bg.setFillStyle(colors.dark); bg.setStrokeStyle(2, colors.mid, 0.9); });
  pad.on('pointerdown', () => { press(); if (cb) cb(); });
  pad.on('pointerup', release);
  return root;
}

function addStatCard(scene, x, y, w, h, label, value, sub, accentHex, depth = 0) {
  const card = scene.add.container(x, y).setDepth(depth);
  const bg = scene.add.rectangle(0, 0, w, h, 0x08081a, 0.95).setStrokeStyle(1.5, accentHex, 0.45);
  const rail = scene.add.rectangle(-w/2 + 3, 0, 4, h - 8, accentHex, 0.85).setOrigin(0, 0.5);
  const lbl = scene.add.text(-w/2 + 14, -h/2 + 10, label, {
    fontSize: '9px', fontFamily: RW.FONT,
    color: '#' + accentHex.toString(16).padStart(6, '0'), letterSpacing: 1
  }).setOrigin(0, 0);
  const val = scene.add.text(-w/2 + 14, -2, value, {
    fontSize: '18px', fontFamily: RW.FONT, color: '#f4f6ff', stroke: '#00000088', strokeThickness: 2
  }).setOrigin(0, 0.5);
  const subT = scene.add.text(-w/2 + 14, h/2 - 12, sub, {
    fontSize: '10px', fontFamily: RW.FONT_BODY, color: '#667799', wordWrap: { width: w - 22 }
  }).setOrigin(0, 1);
  card.add([bg, rail, lbl, val, subT]);
  return card;
}

function floatJuice(scene, x, y, msg, color, size = 14, scrollFixed = false) {
  const sx = scrollFixed ? x : x - scene.cameras.main.scrollX;
  const sy = scrollFixed ? y : y - scene.cameras.main.scrollY;
  const t = scene.add.text(sx, sy, msg, {
    fontSize: `${size}px`, color, fontFamily: RW.FONT, stroke: '#000000', strokeThickness: 3
  }).setOrigin(0.5).setDepth(scrollFixed ? 200 : 200).setScrollFactor(scrollFixed ? 0 : 1).setScale(0.6);
  scene.tweens.add({
    targets: t, scale: 1, y: sy - 52, alpha: 0, duration: 1200, ease: 'Cubic.easeOut',
    onComplete: () => t.destroy()
  });
}

// ── Persistent save / load via localStorage ───────────────────
function saveProgress(reg) {
  try {
    localStorage.setItem('rw_save', JSON.stringify({
      oils:          reg.get('oils')          || 0,
      nuts:          reg.get('nuts')          || 0,
      level:         reg.get('level')         || 1,
      wave:          reg.get('wave')          || 1,
      selectedRobot: reg.get('selectedRobot') || 'og',
      storyDone:     !!reg.get('storyDone'),
    }));
  } catch(e) {}
}
function loadProgress(reg) {
  try {
    const d = JSON.parse(localStorage.getItem('rw_save') || 'null');
    if (!d) return;
    ['oils','nuts','level','wave','selectedRobot','storyDone'].forEach(k => {
      if (d[k] !== undefined) reg.set(k, d[k]);
    });
  } catch(e) {}
}

      g.lineStyle(2,0x44aaff,.22); g.strokeCircle(55,55,50);
      g.lineStyle(1.5,0xffffff,.12); g.strokeCircle(55,55,34);
      g.lineStyle(1,0x00ff88,.08); g.strokeCircle(55,55,18);
      g.fillStyle(0xffffff,.04); g.fillCircle(55,55,52);
    });
    stamp('jThumb',58,58,g=>{
      g.fillStyle(0xffffff,.22); g.fillCircle(29,29,26);
      g.lineStyle(2,0xffffff,.45); g.strokeCircle(29,29,26);
      g.fillStyle(0x00ff88,.12); g.fillCircle(29,29,12);
    });
    stamp('uiDot',8,8,g=>{ g.fillStyle(0x556688); g.fillCircle(4,4,4); });
    stamp('star',3,3,g=>{ g.fillStyle(0xffffff); g.fillRect(0,0,3,3); });
    stamp('panelDim',W,H,g=>{ g.fillStyle(0x000000,.7); g.fillRect(0,0,W,H); });

    g.destroy();

    loadProgress(this.registry);

    if (this.registry.get('storyDone')) {
      this.scene.start('Menu');
    } else {
      this.scene.start('Story');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// STORY  –  6 illustrated panels, tap to advance
// ═══════════════════════════════════════════════════════════════
class StoryScene extends Phaser.Scene {
  constructor() { super('Story'); }

  create() {
    this.idx = -1;
    this.busy = false;

    this.bg = this.add.rectangle(0,0,W,H,0x000000).setOrigin(0).setDepth(0);
    this.illGfx = this.add.graphics().setDepth(1);

    // text box at bottom
    this.add.rectangle(0,H*0.58,W,H*0.42,0x03030f,.97).setOrigin(0).setDepth(2);
    this.add.rectangle(0,H*0.575,W,2,0x333366,.8).setOrigin(0).setDepth(2);

    this.txt = this.add.text(W/2, H*0.66,'',{
      fontSize:'16px', fontFamily:'Arial,sans-serif', color:'#e8e8ff',
      align:'center', wordWrap:{width:W-48}, lineSpacing:7
    }).setOrigin(0.5,0).setDepth(3);

    this.counter = this.add.text(W/2,H-26,'',{
      fontSize:'11px', color:'#444466', fontFamily:'Arial'
    }).setOrigin(0.5).setDepth(3);

    const tapHint = this.add.text(W/2,H-46,'tap to continue ▶',{
      fontSize:'11px', color:'#2a2a55', fontFamily:'Arial'
    }).setOrigin(0.5).setDepth(3);
    this.tweens.add({targets:tapHint, alpha:.15, duration:900, yoyo:true, repeat:-1});

    const skipBtn = this.add.text(W-14,14,'SKIP',{
      fontSize:'12px', color:'#33335a', fontFamily:'Arial Black',
      backgroundColor:'#00000088', padding:{x:8,y:4}
    }).setOrigin(1,0).setDepth(3).setInteractive();
    skipBtn.on('pointerdown',()=>this.finish());

    this.input.on('pointerdown',(p)=>{
      if(p.x>W-70 && p.y<60) return;
      this.advance();
    });

    this.advance();
  }

  advance() {
    if(this.busy) return;
    this.idx++;
    if(this.idx >= this.panels.length){ this.finish(); return; }
    this.busy = true;
    this.cameras.main.fade(120,0,0,0);
    this.time.delayedCall(120,()=>{
      const p = this.panels[this.idx];
      this.bg.setFillStyle(p.bgCol);
      this.illGfx.clear();
      p.draw(this.illGfx);
      this.txt.setText(p.text);
      this.counter.setText(`${this.idx+1} / ${this.panels.length}`);
      this.cameras.main.fadeIn(200);
      this.time.delayedCall(260,()=>{ this.busy=false; });
    });
  }

  finish() {
    this.cameras.main.fade(400,0,0,0);
    this.time.delayedCall(400,()=>this.scene.start('Intro'));
  }

// ═══════════════════════════════════════════════════════════════
// INTRO POV  –  play as OG: find the crystal, revive 2 robots
// ═══════════════════════════════════════════════════════════════
class IntroScene extends Phaser.Scene {
  constructor() { super('Intro'); }

  create() {
    const WW=576, WH=576;
    this.physics.world.setBounds(64,64,WW-128,WH-128);
    this.cameras.main.setBounds(0,0,WW,WH);

    // Ruins tilemap
    for(let x=0;x<WW;x+=64) for(let y=0;y<WH;y+=64) this.add.image(x+32,y+32,'ruinFloor');
    this.walls = this.physics.add.staticGroup();
    for(let x=0;x<WW;x+=64){
      this.walls.create(x+32,32,'ruinWall');
      this.walls.create(x+32,WH-32,'ruinWall');
    }
    for(let y=64;y<WH-64;y+=64){
      this.walls.create(32,y+32,'ruinWall');
      this.walls.create(WW-32,y+32,'ruinWall');
    }

    // Player (OG)
    this.player = this.physics.add.sprite(WW/2,WH-130,'og').setDepth(10).setCollideWorldBounds(true);
    this.physics.add.collider(this.player,this.walls);

    // Crystal in center
    this.crystalObj = this.physics.add.staticSprite(WW/2,180,'crystalBig').setDepth(5);
    this.tweens.add({targets:this.crystalObj, y:174, duration:1400, yoyo:true, repeat:-1, ease:'Sine.easeInOut'});
    this.add.image(WW/2,180,'qmark').setDepth(6).setY(148);

    // Crystal glow tween
    const cGfx = this.add.graphics().setDepth(4);
    this.tweens.add({
      targets:{t:0}, t:1, duration:1200, yoyo:true, repeat:-1,
      onUpdate:(tw,target)=>{
        cGfx.clear();
        const a=0.06+target.t*0.1;
        cGfx.fillStyle(0xff69b4,a); cGfx.fillCircle(WW/2,180,34+target.t*8);
      }
    });

    // Robot parts piles
    this.robyParts  = this.physics.add.staticSprite(130,220,'parts').setDepth(5);
    this.mechyParts = this.physics.add.staticSprite(446,220,'parts').setDepth(5);
    this.robyMark   = this.add.image(130,196,'qmark').setDepth(6).setVisible(false);
    this.mechyMark  = this.add.image(446,196,'qmark').setDepth(6).setVisible(false);

    // State
    this.hasCrystal = false;
    this.revivedRoby  = false;
    this.revivedMechy = false;

    // HUD
    this.buildHUD();
    this.buildJoystick(WW);
    this.keys = this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT');

    this.cameras.main.startFollow(this.player,true,.12,.12);
    this.cameras.main.fadeIn(500);
  }

  buildHUD() {
    // Top quest bar
    this.add.rectangle(0,0,W,52,0x000000,.82).setScrollFactor(0).setDepth(90).setOrigin(0);
    this.add.rectangle(0,50,W,2,0x1a1a44,.9).setScrollFactor(0).setDepth(90).setOrigin(0);
    this.questTitle = this.add.text(W/2,10,'OBJECTIVE',{
      fontSize:'10px', fontFamily:'Arial Black', color:'#555577'
    }).setOrigin(0.5,0).setScrollFactor(0).setDepth(91);
    this.questTxt = this.add.text(W/2,24,'Find the PINK CRYSTAL',{
      fontSize:'14px', fontFamily:'Arial Black', color:'#ff99cc'
    }).setOrigin(0.5,0).setScrollFactor(0).setDepth(91);

    // Skip button
    const skip = this.add.text(W-12,H-22,'Skip intro ▶',{
      fontSize:'12px', color:'#33335a', fontFamily:'Arial',
      backgroundColor:'#00000088', padding:{x:8,y:4}
    }).setOrigin(1,1).setScrollFactor(0).setDepth(92).setInteractive();
    skip.on('pointerdown',()=>this.finishIntro());
  }

  buildJoystick(WW) {
    this.jBase  = this.add.image(85,H-72,'jBase').setScrollFactor(0).setDepth(90).setAlpha(.75);
    this.jThumb = this.add.image(85,H-72,'jThumb').setScrollFactor(0).setDepth(91).setAlpha(.9);
    this.jActive=false; this.jDir={x:0,y:0}; this.jCenter={x:85,y:H-72};
    const R=40;
    this.input.on('pointerdown',p=>{
      if(p.x<W*.55){ this.jActive=true; this.jCenter={x:p.x,y:p.y}; this.jBase.setPosition(p.x,p.y); this.jThumb.setPosition(p.x,p.y); }
    });
    this.input.on('pointermove',p=>{
      if(!this.jActive||p.x>=W*.55) return;
      const dx=p.x-this.jCenter.x, dy=p.y-this.jCenter.y, dist=Math.hypot(dx,dy)||.001;
      const c=Math.min(dist,R), ang=Math.atan2(dy,dx);
      this.jThumb.setPosition(this.jCenter.x+Math.cos(ang)*c, this.jCenter.y+Math.sin(ang)*c);
      this.jDir.x=(dx/dist)*Math.min(1,dist/R); this.jDir.y=(dy/dist)*Math.min(1,dist/R);
    });
    this.input.on('pointerup',p=>{ if(p.x<W*.55){ this.jActive=false; this.jDir={x:0,y:0}; this.jThumb.setPosition(this.jCenter.x,this.jCenter.y); }});
  }

  update() {
    const spd=150;
    let vx=0,vy=0;
    if(this.jActive){ vx=this.jDir.x*spd; vy=this.jDir.y*spd; }
    if(this.keys.LEFT.isDown||this.keys.A.isDown) vx=-spd;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown) vx=spd;
    if(this.keys.UP.isDown||this.keys.W.isDown) vy=-spd;
    if(this.keys.DOWN.isDown||this.keys.S.isDown) vy=spd;
    this.player.setVelocity(vx,vy);
    if(vx!==0) this.player.setFlipX(vx<0);

    if(!this.hasCrystal && this.crystalObj && this.crystalObj.active){
      const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,this.crystalObj.x,this.crystalObj.y);
      if(d<40) this.pickupCrystal();
    }
    if(this.hasCrystal && !this.revivedRoby && this.robyParts && this.robyParts.active){
      const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,this.robyParts.x,this.robyParts.y);
      if(d<44) this.revive('roby');
    }
    if(this.hasCrystal && !this.revivedMechy && this.mechyParts && this.mechyParts.active){
      const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,this.mechyParts.x,this.mechyParts.y);
      if(d<44) this.revive('mechy');
    }
  }

  pickupCrystal() {
    this.hasCrystal=true;
    this.crystalObj.destroy();
    this.cameras.main.flash(300,255,100,180);
    this.cameras.main.shake(200,.008);
    this.float(this.player.x,this.player.y-50,'Crystal acquired!','#ff99cc',18);
    this.questTxt.setText('Revive the fallen robots!').setColor('#00ff88');
    this.robyMark.setVisible(true);
    this.mechyMark.setVisible(true);
    // pink glow on player
    this.tweens.add({targets:this.player, tint:0xff99cc, duration:300, yoyo:true});
  }

  revive(who) {
    if(who==='roby'){ this.revivedRoby=true; this.robyParts.destroy(); this.robyMark.destroy(); }
    else            { this.revivedMechy=true; this.mechyParts.destroy(); this.mechyMark.destroy(); }
    const name=who==='roby'?'ROBY':'MECHY';
    this.cameras.main.flash(400,100,200,255);
    this.float(this.player.x,this.player.y-60,`${name} REVIVED!`,'#00ccff',20);
    // revived robot appears briefly
    const rx=who==='roby'?130:446, ry=220;
    const bot=this.add.image(rx,ry-20,who).setDepth(12).setAlpha(0).setScale(2.2);
    this.tweens.add({targets:bot, alpha:1, y:ry-40, duration:600, hold:1200, ease:'Back.out',
      onComplete:()=>{ this.tweens.add({targets:bot, alpha:0, duration:400, onComplete:()=>bot.destroy()}); }
    });

    if(this.revivedRoby && this.revivedMechy) {
      this.time.delayedCall(2000,()=>this.finishIntro());
    }
  }

  finishIntro() {
    this.registry.set('storyDone',true);
    saveProgress(this.registry);
    this.cameras.main.fade(600,0,0,0);
    this.time.delayedCall(600,()=>this.scene.start('Menu'));
  }

  float(x,y,msg,color,size=15) {
    const sx=x-this.cameras.main.scrollX, sy=y-this.cameras.main.scrollY;
    const t=this.add.text(sx,sy,msg,{fontSize:`${size}px`,color,fontFamily:'Arial Black',stroke:'#000000',strokeThickness:3})
      .setScrollFactor(0).setDepth(200).setOrigin(.5);
    this.tweens.add({targets:t, y:sy-54, alpha:0, duration:1400, ease:'Power2', onComplete:()=>t.destroy()});
  }
}

// ═══════════════════════════════════════════════════════════════
// ROBOT ROAD  –  carousel character select
// ═══════════════════════════════════════════════════════════════
class RobotRoadScene extends Phaser.Scene {
  constructor() { super('RobotRoad'); }

  create() {
    this.safe = RW.safe(this);
    this.nuts = this.registry.get('nuts') || 0;
    this.mechs = [
      {key:'og',   name:'OG',    sub:'The Last Survivor', hp:5200, maxLvHp:9100, cost:0,  unlocked:true},
      {key:'roby', name:'ROBY',  sub:'The Brawler',       hp:3900, maxLvHp:7200, cost:15, unlocked:this.nuts>=15},
      {key:'mechy',name:'MECHY', sub:'The Engineer',      hp:4500, maxLvHp:8200, cost:30, unlocked:this.nuts>=30},
    ];
    this.carouselIndex = Math.max(0, this.mechs.findIndex(m => m.key === (this.registry.get('selectedRobot') || 'og')));
    this.swiping = false;
    this.dragStartX = 0;

    this.buildBackdrop();
    this.buildHeader();
    this.buildCarousel();
    this.buildDots();
    this.buildFooter();
    this.snapTo(this.carouselIndex, false);
    this.cameras.main.fadeIn(300);
  }

  buildBackdrop() {
    this.add.rectangle(0,0,W,H,0x030318).setOrigin(0);
    this.add.rectangle(0,0,W,H*.42,0x08082e,.55).setOrigin(0);
    const grid = this.add.graphics().setAlpha(.04);
    for (let x = 0; x < W; x += 24) { grid.lineStyle(1, 0x4466aa); grid.lineBetween(x, 0, x, H); }
    for (let y = 0; y < H; y += 24) { grid.lineStyle(1, 0x4466aa); grid.lineBetween(0, y, W, y); }
  }

  buildHeader() {
    const top = 14 + this.safe.top;
    this.add.rectangle(0,0,W,top + 52,0x000000,.78).setOrigin(0);
    this.add.rectangle(0,top + 51,W,1.5,0x4433aa,.75).setOrigin(0);
    this.add.text(W/2, top + 4,'ROBOT ROAD',{
      fontSize:'24px', fontFamily:RW.FONT, color:'#cc99ff', stroke:'#110022', strokeThickness:4
    }).setOrigin(.5,0);
    this.nutChip = addCurrencyChip(this, 52, top + 38, 'nut', this.nuts, 0xccaa66);
    this.add.text(W/2, top + 38,'Swipe to browse mechs',{
      fontSize:'11px', color:'#445566', fontFamily:RW.FONT_BODY
    }).setOrigin(.5,.5);
  }

  buildCarousel() {
    const cy = 310 + this.safe.top * 0.4;
    this.carouselY = cy;
    this.track = this.add.container(W/2, cy);
    this.cardWidth = 300;
    this.cards = [];

    this.mechs.forEach((m, i) => {
      const card = this.buildMechCard(m);
      card.x = i * this.cardWidth;
      this.track.add(card);
      this.cards.push(card);
    });

    const zone = this.add.rectangle(W/2, cy, W, 340, 0, 0).setInteractive();
    zone.on('pointerdown', p => { this.swiping = true; this.dragStartX = p.x; this.trackStartX = this.track.x; });
    zone.on('pointermove', p => {
      if (!this.swiping) return;
      const dx = p.x - this.dragStartX;
      this.track.x = this.trackStartX + dx;
      this.updateCardScales();
    });
    zone.on('pointerup', p => {
      if (!this.swiping) return;
      this.swiping = false;
      const dx = p.x - this.dragStartX;
      if (dx < -40 && this.carouselIndex < this.mechs.length - 1) this.snapTo(this.carouselIndex + 1);
      else if (dx > 40 && this.carouselIndex > 0) this.snapTo(this.carouselIndex - 1);
      else this.snapTo(this.carouselIndex);
    });
  }

  buildMechCard(m) {
    const card = this.add.container(0, 0);
    const locked = !m.unlocked;
    const accent = Phaser.Display.Color.HexStringToColor(MECH_DATA[m.key].color).color;
    const bg = this.add.rectangle(0, 0, 284, 320, locked ? 0x06060e : 0x0a0a22, 0.96)
      .setStrokeStyle(2, locked ? 0x222233 : accent, locked ? 0.5 : 0.55);
    const glow = this.add.rectangle(0, -130, 240, 80, accent, locked ? 0 : 0.06);
    card.add([glow, bg]);

    // Portrait stage
    const stage = this.add.rectangle(0, -70, 120, 130, 0x050518, 0.95).setStrokeStyle(1.5, accent, 0.35);
    const portrait = this.add.image(0, -62, m.key).setScale(2.4);
    if (locked) portrait.setTint(0x1a1a33).setAlpha(0.55);
    card.add([stage, portrait]);

    // Name block
    card.add(this.add.text(0, 12, m.name, {
      fontSize:'28px', fontFamily:RW.FONT, color: locked ? '#333355' : MECH_DATA[m.key].color,
      stroke:'#000000', strokeThickness:3
    }).setOrigin(.5));
    card.add(this.add.text(0, 38, m.sub, {
      fontSize:'12px', fontFamily:RW.FONT_BODY, color: locked ? '#2a2a3a' : '#8899bb', letterSpacing: 1
    }).setOrigin(.5));

    if (!locked) {
      const hpCard = addStatCard(this, -72, 108, 138, 58, 'HP', `${m.hp.toLocaleString()}`, `MAX ${m.maxLvHp.toLocaleString()}`, 0x00cc44);
      const superCard = addStatCard(this, 72, 108, 138, 58, 'SUPER', MECH_DATA[m.key].superName.split(' ')[0], MECH_DATA[m.key].superDesc, RW.PINK);
      card.add([hpCard, superCard]);

      const barBg = this.add.rectangle(0, 152, 220, 8, 0x081208);
      const fillW = Math.round(220 * (m.hp / m.maxLvHp));
      const barFill = this.add.rectangle(-110, 152, fillW, 8, 0x00aa44).setOrigin(0, 0.5);
      card.add([barBg, barFill]);

      card.setData('badge', this.add.text(0, 178, 'TAP CARD TO SELECT', {
        fontSize:'10px', fontFamily:RW.FONT, color:'#445566'
      }).setOrigin(.5));
      card.add(card.getData('badge'));

      const hit = this.add.rectangle(0, 40, 284, 280, 0, 0).setInteractive({ useHandCursor: true });
      hit.on('pointerdown', () => {
        if (this.carouselIndex !== this.mechs.indexOf(m)) { this.snapTo(this.mechs.indexOf(m)); return; }
        this.registry.set('selectedRobot', m.key);
        this.refreshBadges();
        this.cameras.main.flash(160, 0, 180, 80);
        floatJuice(this, W/2, this.carouselY - 120, `${m.name} ACTIVE`, MECH_DATA[m.key].color, 18, true);
      });
      card.add(hit);
    } else {
      card.add(this.add.image(-40, 108, 'nut').setScale(1.2));
      card.add(this.add.text(8, 108, `${m.cost} nuts to unlock`, {
        fontSize:'14px', fontFamily:RW.FONT_BODY, color:'#886644'
      }).setOrigin(0, 0.5));
      card.add(this.add.text(0, 150, 'LOCKED', {
        fontSize:'16px', fontFamily:RW.FONT, color:'#332244'
      }).setOrigin(.5));
    }
    card.setData('mechKey', m.key);
    return card;
  }

  buildDots() {
    this.dots = [];
    const dotY = 500 + this.safe.top * 0.3;
    this.mechs.forEach((m, i) => {
      const dot = this.add.circle(W/2 + (i - 1) * 18, dotY, 5, i === this.carouselIndex ? RW.PINK : 0x334455, i === this.carouselIndex ? 1 : 0.6);
      this.dots.push(dot);
    });
  }

  buildFooter() {
    const footY = H - 56 - this.safe.bottom;
    this.add.rectangle(0, footY - 8, W, 64 + this.safe.bottom, 0x000000, 0.88).setOrigin(0);
    this.add.rectangle(0, footY - 8, W, 1.5, 0x2a2a55, 0.85).setOrigin(0);
    addGameButton(this, W/2 - 58, footY + 18, 168, 44, '▶ PLAY', {dark:0x003318,mid:0x00aa44,bright:0x00ff77}, ()=>{
      this.cameras.main.fade(250,0,0,0);
      this.time.delayedCall(250,()=>this.scene.start('Training'));
    });
    addGameButton(this, W - 52, footY + 18, 88, 44, 'BACK', {dark:0x110033,mid:0x5522aa,bright:0x9966ff}, ()=>{
      this.cameras.main.fade(220,0,0,0);
      this.time.delayedCall(220,()=>this.scene.start('Menu'));
    }, 0);
  }

  snapTo(index, animate = true) {
    this.carouselIndex = Phaser.Math.Clamp(index, 0, this.mechs.length - 1);
    const targetX = W/2 - this.carouselIndex * this.cardWidth;
    if (animate) {
      this.tweens.add({
        targets: this.track, x: targetX, duration: 320, ease: 'Cubic.easeOut',
        onUpdate: () => this.updateCardScales(),
        onComplete: () => this.refreshBadges()
      });
    } else {
      this.track.x = targetX;
      this.updateCardScales();
      this.refreshBadges();
    }
    this.dots.forEach((d, i) => {
      d.setFillStyle(i === this.carouselIndex ? RW.PINK : 0x334455, i === this.carouselIndex ? 1 : 0.55);
      d.setScale(i === this.carouselIndex ? 1.25 : 1);
    });
  }

  updateCardScales() {
    this.cards.forEach((card, i) => {
      const worldX = this.track.x + i * this.cardWidth;
      const dist = Math.abs(worldX - W/2) / this.cardWidth;
      const scale = Phaser.Math.Linear(1, 0.82, Phaser.Math.Clamp(dist, 0, 1));
      const alpha = Phaser.Math.Linear(1, 0.45, Phaser.Math.Clamp(dist, 0, 1));
      card.setScale(scale);
      card.setAlpha(alpha);
    });
  }

  refreshBadges() {
    const selected = this.registry.get('selectedRobot') || 'og';
    this.cards.forEach((card, i) => {
      const badge = card.getData('badge');
      if (!badge) return;
      const key = card.getData('mechKey');
      const active = key === selected && i === this.carouselIndex;
      badge.setText(active ? '★ ACTIVE MECH' : 'TAP CARD TO SELECT');
      badge.setColor(active ? '#00ff88' : '#445566');
    });
  }
}

// ═══════════════════════════════════════════════════════════════
// TRAINING  –  combat scene with improved HUD
// ═══════════════════════════════════════════════════════════════
class TrainingScene extends Phaser.Scene {
  constructor() { super('Training'); }

  create() {
    this.oils=this.registry.get('oils')||0;
    this.nuts=this.registry.get('nuts')||0;
    this.wave=this.registry.get('wave')||1;
    this.earnedOils=0;
    this.earnedNuts=0;

    const WW=832, WH=832;
    this.physics.world.setBounds(64,64,WW-128,WH-128);
    this.cameras.main.setBounds(0,0,WW,WH);

    this.buildArena(WW,WH);
    this.spawnPlayer(WW,WH);
    this.spawnEnemies(WW,WH);
    this.buildHUD();
    this.buildJoystick();

    this.cameras.main.startFollow(this.player,true,.1,.1);
    this.cameras.main.fadeIn(350);

    this.time.addEvent({delay:1900, callback:this.enemyShoot, callbackScope:this, loop:true});
    this.time.addEvent({delay:1600, callback:this.rechargeAmmo, callbackScope:this, loop:true});
    this.time.addEvent({delay:100, callback:()=>{
      if(this.superUnlocked && this.superCharge<100){
        this.superCharge=Math.min(100,this.superCharge+.22); this.refreshSuperBar();
      }
    }, loop:true});
  }

  // ── Arena ────────────────────────────────────────────────────
  buildArena(WW,WH) {
    for(let x=0;x<WW;x+=64) for(let y=0;y<WH;y+=64) this.add.image(x+32,y+32,'floor');
    this.walls=this.physics.add.staticGroup();
    for(let x=0;x<WW;x+=64){
      this.walls.create(x+32,32,'wall');
      this.walls.create(x+32,WH-32,'wall');
    }
    for(let y=64;y<WH-64;y+=64){
      this.walls.create(32,y+32,'wall');
      this.walls.create(WW-32,y+32,'wall');
    }
  }

  // ── Player ───────────────────────────────────────────────────
  spawnPlayer(WW,WH) {
    this.mechKey = this.registry.get('selectedRobot') || 'og';
    const data = MECH_DATA[this.mechKey];
    this.player=this.physics.add.sprite(WW/2,WH/2,this.mechKey).setDepth(10).setCollideWorldBounds(true);
    this.physics.add.collider(this.player,this.walls);
    this.pHP=data.hp; this.pMaxHP=data.hp;
    this.ammo=3; this.maxAmmo=3;
    this.superCharge=0; this.alive=true;
    this.bullets=this.physics.add.group();
    this.eBullets=this.physics.add.group();
  }

  // ── Enemies (scales with wave number) ────────────────────────
  spawnEnemies(WW,WH) {
    this.dummies=this.physics.add.group();
    this.shooters=this.physics.add.group();
    this.bigs=this.physics.add.group();

    const w=this.wave;
    const hpMult = 1 + (w-1) * 0.25;                              // +25% HP per wave
    const normalCount  = Math.min(8  + (w-1) * 2,   20);
    const shooterCount = Math.min(4  + Math.floor((w-1)*.8), 14);
    const bigCount     = Math.min(1  + Math.floor((w-1)/4),  5);

    // Scaled base rewards (stored for use in hitEnemy)
    this.normalReward = { oil:Math.round(15*(1+(w-1)*.15)), nut:Math.round(15*(1+(w-1)*.15)) };
    this.bigReward    = { oil:Math.round(25*(1+(w-1)*.2)),  nut:Math.round(25*(1+(w-1)*.2))  };

    const mk=(grp,key,x,y,hp)=>{
      const e=grp.create(x,y,key);
      e.hp=hp; e.maxHp=hp; e.hpGfx=this.add.graphics().setDepth(5);
      this.physics.add.collider(e,this.walls);
      return e;
    };

    // Spread enemies across arena, avoiding center (player spawn)
    const taken=[];
    const spot=()=>{
      for(let t=0;t<30;t++){
        const x=110+Math.random()*(WW-220), y=110+Math.random()*(WH-220);
        if(Math.hypot(x-WW/2,y-WH/2)<160) continue;
        if(taken.some(([sx,sy])=>Math.hypot(x-sx,y-sy)<85)) continue;
        taken.push([x,y]); return [x,y];
      }
      const x=110+Math.random()*(WW-220), y=110+Math.random()*(WH-220);
      taken.push([x,y]); return [x,y];
    };

    for(let i=0;i<normalCount;  i++){ const [x,y]=spot(); mk(this.dummies, 'dummy',     x,y,Math.round(100*hpMult)); }
    for(let i=0;i<shooterCount; i++){ const [x,y]=spot(); mk(this.shooters,'shootDummy',x,y,Math.round(150*hpMult)); }
    for(let i=0;i<bigCount;     i++){ const [x,y]=spot(); mk(this.bigs,    'bigDummy',   x,y,Math.round(500*hpMult)); }
  }

  // ── HUD ──────────────────────────────────────────────────────
  buildHUD() {
    this.safe = RW.safe(this);
    const top = this.safe.top;
    const bottom = this.safe.bottom;
    this.hudBottom = H - 128 - bottom;
    this.superUnlocked = (this.registry.get('level') || 1) >= 10;

    // ── TOP BAR ──────────────────────────────────────
    this.add.rectangle(0,0,W,58 + top,0x000000,.88).setScrollFactor(0).setDepth(90).setOrigin(0);
    this.add.rectangle(0,57 + top,W,1.5,0x334466,.9).setScrollFactor(0).setDepth(90).setOrigin(0);

    // Back button — plain interactive rect with scrollFactor(0) so hit area
    // stays fixed to screen even when the arena camera scrolls
    const backBg = this.add.rectangle(32, 28 + top, 48, 36, 0x331166, 0.92)
      .setScrollFactor(0).setDepth(91).setStrokeStyle(2, 0x7744aa, 0.9).setInteractive();
    this.add.text(32, 28 + top, '←', {
      fontSize:'20px', fontFamily:RW.FONT, color:'#ffffff', stroke:'#000000', strokeThickness:3
    }).setOrigin(0.5).setScrollFactor(0).setDepth(92);
    backBg.on('pointerover',  ()=>backBg.setFillStyle(0x6622cc, 0.95));
    backBg.on('pointerout',   ()=>backBg.setFillStyle(0x331166, 0.92));
    backBg.on('pointerdown',  ()=>{ backBg.setFillStyle(0x220044, 0.95); });
    backBg.on('pointerup',    ()=>{
      this.save(); this.cameras.main.fade(280,0,0,0);
      this.time.delayedCall(280,()=>this.scene.start('Menu'));
    });

    const lv=this.registry.get('level')||1;
    const badgeX = 78;
    this.add.rectangle(badgeX, 18 + top, 48, 18, 0x1a1400,.92).setScrollFactor(0).setDepth(91).setStrokeStyle(1,0x664400,.75);
    this.lvTxt=this.add.text(badgeX, 18 + top, `LV${lv}`,{fontSize:'11px',fontFamily:RW.FONT,color:'#ffcc44'}).setOrigin(.5).setScrollFactor(0).setDepth(92);
    this.add.rectangle(badgeX, 40 + top, 48, 16, 0x001433,.92).setScrollFactor(0).setDepth(91).setStrokeStyle(1,0x004488,.75);
    this.add.text(badgeX, 40 + top, `W${this.wave}`,{fontSize:'10px',fontFamily:RW.FONT,color:'#55aaff'}).setOrigin(.5).setScrollFactor(0).setDepth(92);

    this.add.image(W/2, 32 + top,'hpBg').setScrollFactor(0).setDepth(91);
    this.hpFillIm=this.add.image(W/2, 32 + top,'hpFill').setScrollFactor(0).setDepth(92).setOrigin(.5);
    this.hpTxt=this.add.text(W/2, 32 + top, `${this.pHP}`,{fontSize:'10px',fontFamily:RW.FONT,color:'#ffffff',stroke:'#000000',strokeThickness:2}).setOrigin(.5).setScrollFactor(0).setDepth(93);
    this.add.text(W/2-100, 20 + top, MECH_DATA[this.mechKey].name,{fontSize:'9px',color:MECH_DATA[this.mechKey].color,fontFamily:RW.FONT}).setScrollFactor(0).setDepth(93);

    this.oilChip = addCurrencyChip(this, W - 88, 18 + top, 'oil', this.oils, 0x6688aa, 91);
    this.nutChip = addCurrencyChip(this, W - 88, 42 + top, 'nut', this.nuts, 0xccaa66, 91);

    // ── BOTTOM BAR ───────────────────────────────────
    this.add.rectangle(0, this.hudBottom, W, H - this.hudBottom, 0x000000,.78).setScrollFactor(0).setDepth(90).setOrigin(0);
    this.add.rectangle(0, this.hudBottom, W, 1.5, 0x2a3355,.9).setScrollFactor(0).setDepth(90).setOrigin(0);

    this.add.text(W-16, this.hudBottom + 8,'AMMO',{fontSize:'9px',color:'#446655',fontFamily:RW.FONT}).setOrigin(1,0).setScrollFactor(0).setDepth(91);
    this.ammoPips=[];
    for(let i=0;i<3;i++){
      const p=this.add.image(W-14-(2-i)*40, this.hudBottom + 28,'ammoOn').setScrollFactor(0).setDepth(91).setOrigin(1,.5);
      this.ammoPips.push(p);
    }

    // Fire button — glass ring + press feedback
    const fireY = this.hudBottom + 68;
    this.fireBtn = this.add.image(W-46, fireY,'fireBtn').setScrollFactor(0).setDepth(91).setInteractive({ useHandCursor: true }).setScale(0.92);
    this._fireHeld=false; this._fireTimer=null;
    const firePress = () => { this.fireBtn.setScale(0.86); this.fireBtn.setAlpha(0.85); };
    const fireRelease = () => { this.fireBtn.setScale(0.92); this.fireBtn.setAlpha(1); };
    this.fireBtn.on('pointerdown',()=>{
      firePress();
      this._fireHeld=true;
      this.shoot();
      this._fireTimer=this.time.addEvent({delay:280,callback:()=>{ if(this._fireHeld) this.shoot(); },loop:true});
    });
    this.fireBtn.on('pointerup',  ()=>{ fireRelease(); this._fireHeld=false; if(this._fireTimer){this._fireTimer.remove();this._fireTimer=null;} });
    this.fireBtn.on('pointerout', ()=>{ fireRelease(); this._fireHeld=false; if(this._fireTimer){this._fireTimer.remove();this._fireTimer=null;} });

    // Super bar
    const superBarY = this.hudBottom + 12;
    this.add.image(W/2-36, superBarY,'sBg').setScrollFactor(0).setDepth(91).setScale(.82,1);
    this.sFillIm=this.add.image(W/2-36, superBarY,'sFill').setScrollFactor(0).setDepth(92).setScale(.0001,1).setOrigin(.5);
    this.superBarLbl = this.add.text(W/2-36, superBarY, this.superUnlocked ? 'SUPER' : 'SUPER · LV10', {
      fontSize:'8px', color: this.superUnlocked ? '#336688' : '#443355', fontFamily:RW.FONT
    }).setOrigin(.5).setScrollFactor(0).setDepth(93);

    // Super button
    const superY = this.hudBottom + 96;
    const superTex = this.superUnlocked ? 'superBtn' : 'superBtnLocked';
    this.superBtnImg=this.add.image(W-46, superY, superTex).setScrollFactor(0).setDepth(91).setScale(.54).setInteractive({ useHandCursor: true });
    this.superGlow = this.add.circle(W-46, superY, 34, RW.PINK, 0).setScrollFactor(0).setDepth(90);
    this.superLbl = this.add.text(W-46, superY + 22, this.superUnlocked ? 'SUPER' : 'LV10', {
      fontSize:'8px', color: this.superUnlocked ? '#4488cc' : '#444466', fontFamily:RW.FONT
    }).setOrigin(.5,0).setScrollFactor(0).setDepth(92);
    this.superBtnImg.on('pointerdown',()=>{
      if (!this.superUnlocked) {
        floatJuice(this, W-46, superY - 40, 'UNLOCK AT LV10', '#8866aa', 12, true);
        this.tweens.add({ targets: this.superBtnImg, angle: { from: -6, to: 6 }, duration: 50, yoyo: true, repeat: 3 });
        return;
      }
      this.superBtnImg.setScale(0.48);
      this.activateSuper();
      this.time.delayedCall(120, () => this.superBtnImg.setScale(0.54));
    });
    this._superPulsing = false;
  }

  // ── Joystick ─────────────────────────────────────────────────
  buildJoystick() {
    const jY = this.hudBottom + 68;
    this.jBase=this.add.image(82, jY,'jBase').setScrollFactor(0).setDepth(90).setAlpha(.68).setScale(0.88);
    this.jThumb=this.add.image(82, jY,'jThumb').setScrollFactor(0).setDepth(91).setAlpha(.82).setScale(0.88);
    this.jActive=false; this.jDir={x:0,y:0}; this.jCenter={x:82,y:jY};
    const R=36;
    this.input.on('pointerdown',p=>{
      if(p.x<W*.5 && p.y > this.hudBottom){ this.jActive=true; this.jCenter={x:p.x,y:p.y}; this.jBase.setPosition(p.x,p.y); this.jThumb.setPosition(p.x,p.y); }
    });
    this.input.on('pointermove',p=>{
      if(!this.jActive||p.x>=W*.5||p.y <= this.hudBottom) return;
      const dx=p.x-this.jCenter.x, dy=p.y-this.jCenter.y, dist=Math.hypot(dx,dy)||.001;
      const c=Math.min(dist,R), ang=Math.atan2(dy,dx);
      this.jThumb.setPosition(this.jCenter.x+Math.cos(ang)*c, this.jCenter.y+Math.sin(ang)*c);
      this.jDir.x=(dx/dist)*Math.min(1,dist/R); this.jDir.y=(dy/dist)*Math.min(1,dist/R);
    });
    this.input.on('pointerup',p=>{ if(p.x<W*.5){ this.jActive=false; this.jDir={x:0,y:0}; this.jThumb.setPosition(this.jCenter.x,this.jCenter.y); }});
    this.keys=this.input.keyboard.addKeys('W,A,S,D,UP,DOWN,LEFT,RIGHT,SPACE');
  }

  // ── Main update ──────────────────────────────────────────────
  update() {
    if(!this.alive) return;
    const spd=165;
    let vx=0,vy=0;
    if(this.jActive){ vx=this.jDir.x*spd; vy=this.jDir.y*spd; }
    if(this.keys.LEFT.isDown||this.keys.A.isDown)   vx=-spd;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown)  vx= spd;
    if(this.keys.UP.isDown||this.keys.W.isDown)     vy=-spd;
    if(this.keys.DOWN.isDown||this.keys.S.isDown)   vy= spd;
    if(Phaser.Input.Keyboard.JustDown(this.keys.SPACE)) this.shoot();
    this.player.setVelocity(vx,vy);
    if(vx!==0) this.player.setFlipX(vx<0);

    [this.dummies,this.shooters,this.bigs].forEach(grp=>grp.getChildren().forEach(e=>{ if(e.active) this.drawEHP(e); }));

    this.physics.overlap(this.bullets,this.dummies,  (b,e)=>this.hitEnemy(b,e,15,15));
    this.physics.overlap(this.bullets,this.shooters, (b,e)=>this.hitEnemy(b,e,15,15));
    this.physics.overlap(this.bullets,this.bigs,     (b,e)=>this.hitEnemy(b,e,25,25,true));
    this.physics.overlap(this.eBullets,this.player,  (p,b)=>this.playerHit(b));

    [...this.bullets.getChildren(),...this.eBullets.getChildren()].forEach(b=>{
      if(b.x<0||b.x>900||b.y<0||b.y>900) b.destroy();
    });

    if (this.superUnlocked) {
      const ready = this.superCharge >= 100;
      this.superBtnImg.setTexture(ready ? 'superBtnReady' : 'superBtn');
      this.superBtnImg.setTint(ready ? 0xffffff : 0x8899aa);
      this.superBtnImg.setAlpha(ready ? 1 : 0.75);
      if (ready && !this._superPulsing) {
        this._superPulsing = true;
        this.tweens.add({ targets: this.superBtnImg, scaleX: 0.6, scaleY: 0.6, duration: 450, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        this.tweens.add({ targets: this.superGlow, alpha: { from: 0.08, to: 0.28 }, scale: { from: 0.9, to: 1.15 }, duration: 450, yoyo: true, repeat: -1 });
      } else if (!ready && this._superPulsing) {
        this._superPulsing = false;
        this.tweens.killTweensOf(this.superBtnImg);
        this.tweens.killTweensOf(this.superGlow);
        this.superBtnImg.setScale(0.54);
        this.superGlow.setAlpha(0);
        this.superGlow.setScale(1);
      }
    }
  }

  // ── Combat ───────────────────────────────────────────────────
  shoot() {
    if(this.ammo<=0||!this.alive) return;
    this.ammo--; this.refreshAmmo();
    const tgt=this.nearestEnemy();
    const ang=tgt ? Phaser.Math.Angle.Between(this.player.x,this.player.y,tgt.x,tgt.y) : (this.player.flipX?Math.PI:0);
    const b=this.bullets.create(this.player.x,this.player.y,'bullet').setDepth(9);
    b.setVelocity(Math.cos(ang)*320,Math.sin(ang)*320);
    if (this.superUnlocked) {
      this.superCharge=Math.min(100,this.superCharge+6); this.refreshSuperBar();
    }
  }

  activateSuper() {
    if(!this.superUnlocked || this.superCharge<100||!this.alive) return;
    this.superCharge=0; this.refreshSuperBar(); this._superPulsing=false;
    this.cameras.main.shake(320,.012);

    if (this.mechKey === 'og') {
      // ── OG: 8-direction energy burst ──────────────────────────
      this.cameras.main.flash(220,0,200,100);
      for(let d=0;d<360;d+=45){
        const r=Phaser.Math.DegToRad(d);
        const b=this.bullets.create(this.player.x,this.player.y,'sBullet').setDepth(9).setScale(1.4);
        b.setVelocity(Math.cos(r)*360,Math.sin(r)*360);
        b.isSuperBullet=true;
      }
      this.float(this.player.x,this.player.y-62,'OMNI WAVE!','#00ffff',28);

    } else if (this.mechKey === 'roby') {
      // ── ROBY: laser cross from left eye (N/S/E/W fast beams) ──
      this.cameras.main.flash(220,255,20,60);
      [0,90,180,270].forEach(deg=>{
        const r=Phaser.Math.DegToRad(deg);
        const b=this.bullets.create(this.player.x,this.player.y,'sBullet').setDepth(9).setScale(2.2,.55);
        b.setVelocity(Math.cos(r)*520,Math.sin(r)*520);
        b.setTint(0xff1133);
        b.isSuperBullet=true;
      });
      this.float(this.player.x,this.player.y-62,'LASER CROSS!','#ff2244',28);

    } else if (this.mechKey === 'mechy') {
      // ── MECHY: missile barrage — one missile per enemy ─────────
      this.cameras.main.flash(220,0,120,255);
      const targets=[...this.dummies.getChildren(),...this.shooters.getChildren(),...this.bigs.getChildren()].filter(e=>e.active);
      const fireAt=(ang)=>{
        const b=this.bullets.create(this.player.x,this.player.y,'sBullet').setDepth(9).setScale(1.3);
        b.setVelocity(Math.cos(ang)*440,Math.sin(ang)*440);
        b.setTint(0x00aaff);
        b.isSuperBullet=true;
      };
      if(targets.length>0){
        targets.forEach(tgt=>fireAt(Phaser.Math.Angle.Between(this.player.x,this.player.y,tgt.x,tgt.y)));
      } else {
        for(let d=0;d<360;d+=45) fireAt(Phaser.Math.DegToRad(d));
      }
      this.float(this.player.x,this.player.y-62,'MISSILE BARRAGE!','#00ccff',24);
    }
  }

  enemyShoot() {
    if(!this.alive) return;
    this.shooters.getChildren().forEach(e=>{
      if(!e.active) return;
      if(Phaser.Math.Distance.Between(e.x,e.y,this.player.x,this.player.y)>380) return;
      const ang=Phaser.Math.Angle.Between(e.x,e.y,this.player.x,this.player.y);
      const b=this.eBullets.create(e.x,e.y,'eBullet').setDepth(8);
      b.setVelocity(Math.cos(ang)*195,Math.sin(ang)*195);
    });
  }

  hitEnemy(bullet,enemy,_o,_n,isBig=false) {
    const dmg=bullet.isSuperBullet?65:32;
    enemy.hp-=dmg;
    this.float(enemy.x,enemy.y-22,`-${dmg}`,isBig?'#ff8800':'#ffff44',isBig?18:14);
    bullet.destroy();
    if (this.superUnlocked) {
      this.superCharge=Math.min(100,this.superCharge+(isBig?4:7)); this.refreshSuperBar();
    }
    if(enemy.hp<=0){
      if(enemy.hpGfx) enemy.hpGfx.destroy();
      const r=isBig?this.bigReward:this.normalReward;
      this.oils+=r.oil; this.nuts+=r.nut;
      this.earnedOils+=r.oil; this.earnedNuts+=r.nut;
      this.oilChip.getData('setValue')(this.oils);
      this.nutChip.getData('setValue')(this.nuts);
      this.float(enemy.x,enemy.y-48,`+${r.oil} oils  +${r.nut} nuts`,isBig?'#ff8800':'#aaffaa',isBig?15:12);
      if(isBig){ this.cameras.main.shake(420,.016); this.cameras.main.flash(280,255,100,0); }
      this.checkLevelUp(); enemy.destroy(); this.save(); this.checkAllClear();
    }
  }

  playerHit(bullet) {
    bullet.destroy();
    this.pHP=Math.max(0,this.pHP-115); this.refreshHP();
    this.cameras.main.shake(130,.008);
    this.player.setTint(0xff3333);
    this.time.delayedCall(180,()=>this.player.clearTint());
    if(this.pHP<=0) this.playerDied();
  }

  // ── Utils ────────────────────────────────────────────────────
  nearestEnemy() {
    const all=[...this.dummies.getChildren(),...this.shooters.getChildren(),...this.bigs.getChildren()].filter(e=>e.active);
    let nearest=null,best=1e9;
    all.forEach(e=>{ const d=Phaser.Math.Distance.Between(this.player.x,this.player.y,e.x,e.y); if(d<best){best=d;nearest=e;} });
    return nearest;
  }

  drawEHP(e) {
    const g=e.hpGfx; g.clear();
    const w=e.width*.9, h=5, x=e.x-w/2, y=e.y-e.height/2-9, pct=e.hp/e.maxHp;
    g.fillStyle(0x111122); g.fillRect(x,y,w,h);
    g.fillStyle(pct>.5?0x00cc44:pct>.25?0xffaa00:0xff2222); g.fillRect(x,y,w*pct,h);
  }

  rechargeAmmo() { if(this.ammo<this.maxAmmo){ this.ammo++; this.refreshAmmo(); } }

  refreshAmmo() {
    this.ammoPips.forEach((p,i)=>p.setTexture(i<this.ammo?'ammoOn':'ammoOff'));
  }

  refreshHP() {
    const pct=Math.max(0,this.pHP/this.pMaxHP);
    this.hpFillIm.setScale(pct,1); this.hpFillIm.setX(W/2-(1-pct)*105);
    this.hpTxt.setText(`${this.pHP}`);
    this.hpFillIm.setTint(pct>.5?0x00cc44:pct>.25?0xffaa00:0xff2222);
  }

  refreshSuperBar() {
    if (!this.superUnlocked) return;
    const pct=Math.max(.0001,this.superCharge/100);
    this.sFillIm.setScale(.82*pct,1);
    this.sFillIm.setX(W/2-36-80*.82*(1-pct));
  }

  unlockSuperUI() {
    this.superUnlocked = true;
    this.superBtnImg.setTexture('superBtn');
    this.superLbl.setText('SUPER').setColor('#4488cc');
    this.superBarLbl.setText('SUPER').setColor('#336688');
    floatJuice(this, W-46, this.superBtnImg.y - 50, 'SUPER ONLINE!', '#00ccff', 16, true);
  }

  checkLevelUp() {
    const lv=this.registry.get('level')||1;
    if(lv>=10||this.nuts<lv*15) return;
    const newLv=lv+1;
    this.registry.set('level',newLv);
    this.lvTxt.setText(`LV${newLv}`);
    this.pMaxHP=Math.round(this.pMaxHP*1.1); this.pHP=this.pMaxHP; this.refreshHP();
    floatJuice(this, W/2, H/2-60, `LEVEL UP! LV ${newLv}`, '#ffcc00', 28, true);
    this.cameras.main.flash(500,255,200,0);
    if(newLv>=10 && !this.superUnlocked) this.unlockSuperUI();
    else if(newLv>=10) floatJuice(this, W/2, H/2-95, 'MAX LEVEL! SUPER CHARGED!', '#00ffff', 18, true);
  }

  checkAllClear() {
    if(this.dummies.countActive()+this.shooters.countActive()+this.bigs.countActive()===0){
      this.alive=false;
      this.float(this.player.x,this.player.y-80,'ALL CLEAR!','#00ff88',34);
      this.save();
      this.time.delayedCall(1400,()=>this.showWaveComplete());
    }
  }

  showWaveComplete() {
    const nextWave=this.wave+1;
    const nextHpMult=1+(nextWave-1)*.25;
    const nextNorm=Math.min(8+(nextWave-1)*2,20);
    const nextShoot=Math.min(4+Math.floor((nextWave-1)*.8),14);
    const nextBig=Math.min(1+Math.floor((nextWave-1)/4),5);

    // Dim overlay
    const dim=this.add.rectangle(0,0,W,H,0x000000,.78).setScrollFactor(0).setDepth(300).setOrigin(0);
    // Panel
    const panel=this.add.rectangle(W/2,H/2,W-32,300,0x06061c).setScrollFactor(0).setDepth(301).setStrokeStyle(2,0x00ff88,.9);

    const sf0={scrollFactorX:0,scrollFactorY:0};

    this.add.text(W/2,H/2-128,`WAVE ${this.wave} CLEAR!`,{
      fontSize:'26px',fontFamily:'Arial Black',color:'#00ff88',stroke:'#002211',strokeThickness:5
    }).setOrigin(.5).setScrollFactor(0).setDepth(302);

    this.add.text(W/2,H/2-92,'Earned this wave:',{
      fontSize:'11px',color:'#666688',fontFamily:'Arial'
    }).setOrigin(.5).setScrollFactor(0).setDepth(302);

    this.add.text(W/2,H/2-68,`+${this.earnedOils} oils   +${this.earnedNuts} nuts`,{
      fontSize:'20px',fontFamily:'Arial Black',color:'#ffcc44'
    }).setOrigin(.5).setScrollFactor(0).setDepth(302);

    // Separator
    this.add.rectangle(W/2,H/2-42,W-60,1,0x222244).setScrollFactor(0).setDepth(302);

    this.add.text(W/2,H/2-28,`NEXT: WAVE ${nextWave}`,{
      fontSize:'11px',fontFamily:'Arial Black',color:'#334466'
    }).setOrigin(.5).setScrollFactor(0).setDepth(302);

    this.add.text(W/2,H/2-10,
      `${nextNorm} dummies · ${nextShoot} shooters · ${nextBig} boss${nextBig>1?'es':''}\n(+25% tougher than Wave ${this.wave})`,{
      fontSize:'10px',color:'#2a3a4a',fontFamily:'Arial',align:'center'
    }).setOrigin(.5,0).setScrollFactor(0).setDepth(302);

    // NEXT WAVE button
    const nextBtn=this.add.rectangle(W/2,H/2+72,210,48,0x003311).setScrollFactor(0).setDepth(302).setInteractive().setStrokeStyle(2,0x00cc44,.8);
    this.add.text(W/2,H/2+72,`NEXT WAVE  →`,{
      fontSize:'18px',fontFamily:'Arial Black',color:'#00ff88'
    }).setOrigin(.5).setScrollFactor(0).setDepth(303);
    nextBtn.on('pointerover',()=>nextBtn.setFillStyle(0x004d1a));
    nextBtn.on('pointerout', ()=>nextBtn.setFillStyle(0x003311));
    nextBtn.on('pointerdown',()=>{
      this.registry.set('wave',nextWave);
      this.save();
      this.cameras.main.fade(280,0,0,0);
      this.time.delayedCall(280,()=>this.scene.restart());
    });

    // Menu button
    const menuBtn=this.add.rectangle(W/2,H/2+126,210,36,0x110022).setScrollFactor(0).setDepth(302).setInteractive().setStrokeStyle(1,0x441188,.7);
    this.add.text(W/2,H/2+126,'← Back to Menu',{
      fontSize:'14px',fontFamily:'Arial Black',color:'#7744aa'
    }).setOrigin(.5).setScrollFactor(0).setDepth(303);
    menuBtn.on('pointerdown',()=>{
      this.save();
      this.cameras.main.fade(280,0,0,0);
      this.time.delayedCall(280,()=>this.scene.start('Menu'));
    });
  }

  playerDied() {
    this.alive=false; this.player.setTint(0xff0000);
    this.float(W/2,H/2-70,'DEFEATED!','#ff2222',38);
    this.save();
    this.time.delayedCall(2400,()=>{ this.cameras.main.fade(350,0,0,0); this.time.delayedCall(350,()=>this.scene.start('Menu')); });
  }

  float(x,y,msg,color,size=14) {
    floatJuice(this, x, y, msg, color, size, false);
  }

  save() {
    this.registry.set('oils',this.oils);
    this.registry.set('nuts',this.nuts);
    saveProgress(this.registry);
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  parent: 'game-shell',
  backgroundColor: '#030318',
